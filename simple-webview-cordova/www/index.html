<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no, width=device-width">
    <title>网页浏览器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #2196F3;
        }
        .container {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 30px 24px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }
        h1 {
            text-align: center;
            color: #333;
            font-size: 24px;
            margin-bottom: 8px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 24px;
        }
        label {
            display: block;
            color: #333;
            font-size: 14px;
            margin-bottom: 8px;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 14px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
        }
        input:focus {
            outline: none;
            border-color: #2196F3;
        }
        .btn-open {
            width: 100%;
            padding: 14px;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
        }
        .btn-open:hover {
            background: #1976D2;
        }
        .saved-urls {
            margin-top: 20px;
        }
        .saved-url {
            display: inline-block;
            background: #f0f0f0;
            padding: 6px 12px;
            border-radius: 4px;
            margin: 4px;
            font-size: 13px;
            cursor: pointer;
            color: #333;
        }
        .saved-url:hover {
            background: #e0e0e0;
        }
        .clear-btn {
            text-align: right;
            font-size: 12px;
            color: #999;
            cursor: pointer;
            margin-top: 8px;
        }
        .clear-btn:hover {
            color: #f44336;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>网页浏览器</h1>
            <p class="subtitle">输入网址，在原生 WebView 中打开</p>

            <div class="form-group">
                <label for="urlInput">网址</label>
                <input type="url" id="urlInput" placeholder="https://example.com">
            </div>

            <div id="historyContainer" class="saved-urls" style="display: none;">
                <label>历史记录</label>
                <div id="historyList"></div>
                <div class="clear-btn" id="clearBtn">清除历史</div>
            </div>

            <button class="btn-open" id="openBtn">打开网页</button>
        </div>
    </div>

    <script type="text/javascript" src="cordova.js"></script>
    <script type="text/javascript">
        const HISTORY_KEY = 'url_history';
        const MAX_HISTORY = 5;

        document.addEventListener('deviceready', onDeviceReady, false);

        function onDeviceReady() {
            loadHistory();

            document.getElementById('openBtn').addEventListener('click', openUrl);
            document.getElementById('urlInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    openUrl();
                }
            });
            document.getElementById('clearBtn').addEventListener('click', clearHistory);
        }

        function openUrl() {
            const input = document.getElementById('urlInput');
            let url = input.value.trim();

            if (url.length === 0) {
                alert('请输入网址');
                return;
            }

            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }

            // 保存到历史记录
            saveToHistory(url);

            // 用 InAppBrowser 打开（真正的原生 WebView）
            cordova.InAppBrowser.open(url, '_blank', 'location=yes,toolbar=yes,clearcache=yes,clearsessioncache=yes');
        }

        function saveToHistory(url) {
            let history = getHistory();
            // 去重
            history = history.filter(item => item !== url);
            // 添加到开头
            history.unshift(url);
            // 限制数量
            if (history.length > MAX_HISTORY) {
                history = history.slice(0, MAX_HISTORY);
            }
            localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
            loadHistory();
        }

        function getHistory() {
            const data = localStorage.getItem(HISTORY_KEY);
            if (!data) return [];
            try {
                return JSON.parse(data);
            } catch(e) {
                return [];
            }
        }

        function loadHistory() {
            const history = getHistory();
            const container = document.getElementById('historyContainer');
            const list = document.getElementById('historyList');

            if (history.length === 0) {
                container.style.display = 'none';
                return;
            }

            container.style.display = 'block';
            list.innerHTML = '';

            history.forEach(url => {
                const div = document.createElement('span');
                div.className = 'saved-url';
                // 只显示域名
                let display = url.replace(/^https?:\/\//, '');
                if (display.length > 25) {
                    display = display.substring(0, 22) + '...';
                }
                div.textContent = display;
                div.addEventListener('click', () => {
                    document.getElementById('urlInput').value = url;
                });
                list.appendChild(div);
            });
        }

        function clearHistory() {
            localStorage.removeItem(HISTORY_KEY);
            loadHistory();
        }
    </script>
</body>
</html>
