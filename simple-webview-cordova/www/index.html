<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no, width=device-width">
    <title>网页浏览器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #webviewContainer {
            width: 100%;
            height: 100%;
            display: none;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .header {
            background: #2196F3;
            color: white;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            font-size: 18px;
            font-weight: 500;
        }
        .btn-change {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
        }
        .btn-change:hover {
            background: rgba(255,255,255,0.3);
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.show {
            display: flex;
        }
        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 8px;
            width: 90%;
            max-width: 400px;
        }
        .modal-content h2 {
            font-size: 18px;
            margin-bottom: 16px;
        }
        .modal-content input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
            margin-bottom: 16px;
        }
        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
        }
        .btn-cancel {
            background: #f5f5f5;
            color: #333;
        }
        .btn-ok {
            background: #2196F3;
            color: white;
        }
        .splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #2196F3;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div id="splash" class="splash">
        <div>网页浏览器</div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h2>请输入网址</h2>
            <input type="url" id="urlInput" placeholder="https://example.com">
            <div class="modal-buttons">
                <button class="btn btn-cancel" id="cancelBtn">取消</button>
                <button class="btn btn-ok" id="confirmBtn">确定</button>
            </div>
        </div>
    </div>

    <div id="appContainer">
        <div class="header">
            <h1>网页浏览器</h1>
            <button class="btn-change" id="changeUrlBtn">更换网址</button>
        </div>
        <div id="webviewContainer">
            <iframe id="contentFrame"></iframe>
        </div>
    </div>

    <script type="text/javascript" src="cordova.js"></script>
    <script type="text/javascript">
        const STORAGE_KEY = 'saved_url';

        document.addEventListener('deviceready', onDeviceReady, false);

        function onDeviceReady() {
            const savedUrl = localStorage.getItem(STORAGE_KEY);

            document.getElementById('changeUrlBtn').addEventListener('click', showModal);
            document.getElementById('confirmBtn').addEventListener('click', confirmUrl);
            document.getElementById('cancelBtn').addEventListener('click', hideModal);
            document.getElementById('urlInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    confirmUrl();
                }
            });

            document.getElementById('splash').style.display = 'none';

            if (savedUrl && savedUrl.length > 0) {
                loadUrl(savedUrl);
            } else {
                showModal();
            }
        }

        function showModal() {
            const modal = document.getElementById('modal');
            modal.classList.add('show');
            const input = document.getElementById('urlInput');
            const current = localStorage.getItem(STORAGE_KEY);
            if (current) {
                input.value = current;
            }
            input.focus();
        }

        function hideModal() {
            document.getElementById('modal').classList.remove('show');
        }

        function confirmUrl() {
            const input = document.getElementById('urlInput');
            let url = input.value.trim();
            if (url.length === 0) {
                alert('请输入网址');
                return;
            }
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            localStorage.setItem(STORAGE_KEY, url);
            hideModal();
            loadUrl(url);
        }

        function loadUrl(url) {
            const container = document.getElementById('webviewContainer');
            const frame = document.getElementById('contentFrame');
            container.style.display = 'block';
            frame.src = url;
        }
    </script>
</body>
</html>
