<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no, width=device-width">
    <title>网页浏览器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            height: 100%;
            overflow: hidden;
            background: #f5f5f5;
        }
        /* 顶部导航栏（始终显示）*/
        .top-bar {
            background: #2196F3;
            color: white;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            height: 48px;
        }
        .top-bar input {
            flex: 1;
            padding: 6px 8px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
        }
        .top-bar .btn-change {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 14px;
            white-space: nowrap;
        }
        /* 初始弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }
        .modal.show {
            display: flex;
        }
        .modal-card {
            background: white;
            padding: 24px;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
        }
        .modal-card h2 {
            font-size: 18px;
            margin-bottom: 16px;
            color: #333;
        }
        .modal-card input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            margin-bottom: 16px;
        }
        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
        }
        .btn-cancel {
            background: #f5f5f5;
            color: #333;
        }
        .btn-confirm {
            background: #2196F3;
            color: white;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <input type="url" id="currentUrl" placeholder="https://example.com">
        <button class="btn-change" id="changeBtn">更换网址</button>
    </div>

    <div id="urlModal" class="modal">
        <div class="modal-card">
            <h2>输入网址</h2>
            <input type="url" id="modalUrlInput" placeholder="https://example.com">
            <div class="modal-buttons">
                <button class="btn btn-cancel" id="cancelBtn">取消</button>
                <button class="btn btn-confirm" id="confirmBtn">确定</button>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="cordova.js"></script>
    <script type="text/javascript">
        const SAVED_URL_KEY = 'saved_url';

        document.addEventListener('deviceready', onDeviceReady, false);

        function onDeviceReady() {
            // 绑定事件
            document.getElementById('changeBtn').addEventListener('click', showModal);
            document.getElementById('confirmBtn').addEventListener('click', confirmUrl);
            document.getElementById('cancelBtn').addEventListener('click', hideModal);
            document.getElementById('modalUrlInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') confirmUrl();
            });
            document.getElementById('currentUrl').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    const url = document.getElementById('currentUrl').value.trim();
                    if (url) openUrlDirect(url);
                }
            });

            // 检查是否有保存的网址
            const savedUrl = localStorage.getItem(SAVED_URL_KEY);
            if (savedUrl && savedUrl.length > 0) {
                // 有保存的网址，直接打开
                document.getElementById('currentUrl').value = savedUrl;
                openUrlDirect(savedUrl);
            } else {
                // 第一次打开，显示弹窗
                showModal();
            }
        }

        function showModal() {
            const modal = document.getElementById('urlModal');
            const input = document.getElementById('modalUrlInput');
            const current = document.getElementById('currentUrl').value;
            if (current) {
                input.value = current;
            }
            modal.classList.add('show');
            input.focus();
        }

        function hideModal() {
            document.getElementById('urlModal').classList.remove('show');
        }

        function confirmUrl() {
            const input = document.getElementById('modalUrlInput');
            let url = input.value.trim();

            if (url.length === 0) {
                alert('请输入网址');
                return;
            }

            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }

            // 保存网址
            localStorage.setItem(SAVED_URL_KEY, url);
            document.getElementById('currentUrl').value = url;

            hideModal();
            openUrlDirect(url);
        }

        function openUrlDirect(url) {
            // 用 InAppBrowser 在应用内打开，隐藏工具栏
            cordova.InAppBrowser.open(url, '_blank', 'location=no,toolbar=no,clearcache=yes,clearsessioncache=yes');
        }
    </script>
</body>
</html>
